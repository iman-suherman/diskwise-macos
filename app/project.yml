name: DiskWise
options:
  bundleIdPrefix: net.suherman
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"
  DiskWisePackages:
    path: ..
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  DiskWise:
    type: application
    platform: macOS
    sources:
      - path: DiskWise
        excludes:
          - Assets/AppIcon.icns
          - Assets/AppIconSource.png
          - Assets/AppIconSource.raw.png
    preBuildScripts:
      - name: Sync Release Notes
        script: |
          mkdir -p "${SRCROOT}/DiskWise/Resources/release-notes"
          rsync -a --delete "${SRCROOT}/../release-notes/" "${SRCROOT}/DiskWise/Resources/release-notes/"
        basedOnDependencyAnalysis: false
    resources:
      - path: DiskWise/Assets/AppIcon.icns
      - path: DiskWise/Assets/AppIconSource.png
      - path: DiskWise/Resources/Scanner
      - path: DiskWise/Resources/release-notes
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.suherman.diskwise
        INFOPLIST_FILE: DiskWise/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 5019
        MARKETING_VERSION: 0.5.19
        ENABLE_HARDENED_RUNTIME: YES
        SPARKLE_PUBLIC_ED_KEY: B6P7+AkeawAfMFk4f5j3+0diuQWorDuCYNrVX0vJeV0=
        OTHER_LDFLAGS: $(inherited) -weak_framework FoundationModels
      configs:
        Debug:
          SPARKLE_FEED_URL: http://127.0.0.1:3000/appcast.xml
        Release:
          SPARKLE_FEED_URL: https://diskwise-registry.suherman.net/appcast.xml
    dependencies:
      - package: Sparkle
        product: Sparkle
      - package: DiskWisePackages
        product: DatabaseKit
      - package: DiskWisePackages
        product: DiskScannerKit
      - package: DiskWisePackages
        product: MetadataKit
      - package: DiskWisePackages
        product: DuplicateKit
      - package: DiskWisePackages
        product: CleanupKit
      - package: DiskWisePackages
        product: AIKit
      - package: DiskWisePackages
        product: MaintenanceKit
    scheme:
      testTargets: []

schemes:
  DiskWise:
    build:
      targets:
        DiskWise: all
    run:
      config: Debug
