name: DiskWise
options:
  bundleIdPrefix: net.suherman
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"
  DiskWisePackages:
    path: ..
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  DiskWiseMenuBar:
    type: application
    platform: macOS
    sources:
      - path: DiskWiseMenuBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.suherman.diskwise.menubar
        INFOPLIST_FILE: DiskWiseMenuBar/Info.plist
        LSUIElement: true
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 3006
        MARKETING_VERSION: 0.3.6
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: DiskWisePackages
        product: DiskScannerKit
  DiskWise:
    type: application
    platform: macOS
    sources:
      - path: DiskWise
        excludes:
          - Assets/AppIcon.icns
          - Assets/AppIconSource.png
          - Assets/AppIconSource.raw.png
    resources:
      - path: DiskWise/Assets/AppIcon.icns
      - path: DiskWise/Assets/AppIconSource.png
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.suherman.diskwise
        INFOPLIST_FILE: DiskWise/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 3006
        MARKETING_VERSION: 0.3.6
        ENABLE_HARDENED_RUNTIME: YES
        SPARKLE_PUBLIC_ED_KEY: B6P7+AkeawAfMFk4f5j3+0diuQWorDuCYNrVX0vJeV0=
        OTHER_LDFLAGS: $(inherited) -weak_framework FoundationModels
      configs:
        Debug:
          SPARKLE_FEED_URL: http://127.0.0.1:3000/appcast.xml
        Release:
          SPARKLE_FEED_URL: https://diskwise-registry.suherman.net/appcast.xml
    dependencies:
      - target: DiskWiseMenuBar
        embed: true
        copy:
          destination: wrapper
          subpath: Contents/Library/LoginItems
      - package: Sparkle
        product: Sparkle
      - package: DiskWisePackages
        product: DatabaseKit
      - package: DiskWisePackages
        product: DiskScannerKit
      - package: DiskWisePackages
        product: MetadataKit
      - package: DiskWisePackages
        product: DuplicateKit
      - package: DiskWisePackages
        product: CleanupKit
      - package: DiskWisePackages
        product: AIKit
      - package: DiskWisePackages
        product: MaintenanceKit
    scheme:
      testTargets: []

schemes:
  DiskWise:
    build:
      targets:
        DiskWise: all
        DiskWiseMenuBar: all
    run:
      config: Debug
